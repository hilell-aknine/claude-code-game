<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>דשבורד · Claude Code Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800;900&family=Frank+Ruhl+Libre:wght@500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root{
            --bg-base:#0a0d14; --bg-raised:#121826; --bg-overlay:#1a2233;
            --terminal:#00d4aa; --terminal-dark:#00a886; --blue:#3b82f6; --purple:#8b5cf6;
            --gold:#D4AF37; --warning:#F59E0B; --error:#EF4444;
            --text:#e4e8f0; --text-2:#8b949e; --text-muted:#6e7681;
            --border:#1e2a3a; --r:14px;
            --font:'Heebo',sans-serif; --font-d:'Frank Ruhl Libre',serif; --font-m:'JetBrains Mono',monospace;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg-base);color:var(--text);min-height:100vh;
            background-image:radial-gradient(ellipse 80% 50% at 50% -20%,rgba(0,212,170,0.06),transparent),
                radial-gradient(ellipse 60% 40% at 80% 100%,rgba(139,92,246,0.04),transparent);}
        .wrap{max-width:1000px;margin:0 auto;padding:24px 16px 60px}

        /* Password gate */
        .gate{position:fixed;inset:0;background:var(--bg-base);z-index:50;display:flex;align-items:center;justify-content:center;padding:20px}
        .gate-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:36px 28px;max-width:360px;width:100%;text-align:center}
        .gate-card i{font-size:2.2rem;color:var(--terminal);margin-bottom:14px}
        .gate-card h1{font-family:var(--font-d);font-size:1.4rem;margin-bottom:6px}
        .gate-card p{color:var(--text-2);font-size:.85rem;margin-bottom:20px}
        .gate-input{width:100%;padding:13px 16px;border-radius:10px;border:1px solid var(--border);background:var(--bg-overlay);color:var(--text);font-size:1rem;text-align:center;margin-bottom:12px}
        .gate-input:focus{outline:none;border-color:var(--terminal)}
        .gate-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,var(--terminal),var(--terminal-dark));color:var(--bg-base);font-weight:700;font-size:1rem;cursor:pointer}
        .gate-err{color:var(--error);font-size:.82rem;margin-top:10px;display:none}

        /* Header */
        .head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:10px}
        .head h1{font-family:var(--font-d);font-size:1.6rem;display:flex;align-items:center;gap:10px}
        .head h1 i{color:var(--terminal)}
        .head .sub{color:var(--text-2);font-size:.85rem}
        .refresh{background:var(--bg-raised);border:1px solid var(--border);color:var(--text-2);padding:8px 16px;border-radius:999px;cursor:pointer;font-family:var(--font);font-size:.82rem;display:inline-flex;align-items:center;gap:7px}
        .refresh:hover{border-color:var(--terminal);color:var(--terminal)}
        .note{background:rgba(0,212,170,0.05);border:1px solid rgba(0,212,170,0.15);border-radius:10px;padding:11px 16px;font-size:.8rem;color:var(--text-2);margin:14px 0 24px;line-height:1.6}
        .note i{color:var(--terminal)}

        .section-t{font-size:1rem;font-weight:700;margin:26px 0 12px;color:var(--text);display:flex;align-items:center;gap:8px}
        .section-t i{color:var(--terminal);font-size:.9rem}

        /* KPI grid */
        .grid{display:grid;gap:12px}
        .g4{grid-template-columns:repeat(4,1fr)}
        .g3{grid-template-columns:repeat(3,1fr)}
        .card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:18px 16px;position:relative;overflow:hidden}
        .card::before{content:'';position:absolute;top:0;right:0;left:0;height:2px;background:var(--accent,var(--terminal));opacity:.6}
        .card .num{font-family:var(--font-d);font-size:2rem;font-weight:700;color:var(--accent,var(--terminal));line-height:1}
        .card .lbl{font-size:.82rem;font-weight:600;margin-top:8px}
        .card .exp{font-size:.72rem;color:var(--text-muted);margin-top:4px;line-height:1.45}

        /* Funnel */
        .funnel{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:20px 18px}
        .frow{display:flex;align-items:center;gap:12px;margin-bottom:12px}
        .frow:last-child{margin-bottom:0}
        .frow .flbl{width:140px;flex-shrink:0;font-size:.85rem}
        .fbar-wrap{flex:1;background:var(--bg-overlay);border-radius:999px;height:30px;overflow:hidden;position:relative}
        .fbar{height:100%;border-radius:999px;background:linear-gradient(90deg,var(--terminal),var(--terminal-dark));display:flex;align-items:center;justify-content:flex-start;padding:0 12px;min-width:42px;transition:width .6s cubic-bezier(.16,1,.3,1)}
        .fbar span{font-size:.78rem;font-weight:700;color:var(--bg-base);white-space:nowrap}
        .fpct{width:54px;flex-shrink:0;text-align:left;font-size:.8rem;color:var(--text-2);font-family:var(--font-m)}

        /* Chart */
        .chart-card{background:var(--bg-raised);border:1px solid var(--border);border-radius:var(--r);padding:20px 18px}
        .chart-legend{display:flex;gap:18px;margin-bottom:14px;font-size:.78rem;color:var(--text-2)}
        .chart-legend span{display:inline-flex;align-items:center;gap:6px}
        .dot{width:10px;height:10px;border-radius:3px;display:inline-block}
        svg{width:100%;height:auto;display:block}
        .empty{text-align:center;color:var(--text-muted);padding:30px;font-size:.9rem}

        @media(max-width:720px){.g4{grid-template-columns:repeat(2,1fr)}.g3{grid-template-columns:repeat(2,1fr)}.frow .flbl{width:96px;font-size:.78rem}}
        @media(max-width:420px){.card .num{font-size:1.6rem}}
    </style>
</head>
<body>

    <!-- Password gate -->
    <div class="gate" id="gate">
        <div class="gate-card">
            <i class="fa-solid fa-lock"></i>
            <h1>דשבורד פרטי</h1>
            <p>הזן סיסמה כדי לראות את הנתונים</p>
            <input type="password" class="gate-input" id="gate-input" placeholder="סיסמה" onkeydown="if(event.key==='Enter')checkPass()" autofocus>
            <button class="gate-btn" onclick="checkPass()">כניסה</button>
            <div class="gate-err" id="gate-err">סיסמה שגויה</div>
        </div>
    </div>

    <div class="wrap" id="app" style="display:none">
        <div class="head">
            <div>
                <h1><i class="fa-solid fa-chart-line"></i> דשבורד המשחק</h1>
                <div class="sub">Claude Code Master · נתוני מעורבות חיים</div>
            </div>
            <button class="refresh" onclick="loadStats()"><i class="fa-solid fa-rotate"></i> רענון</button>
        </div>

        <div class="note">
            <i class="fa-solid fa-circle-info"></i>
            הספירה התחילה מרגע שהפעלנו את המעקב. כל מי שנכנס נספר אוטומטית ובעילום שם (בלי הרשמה, בלי שמות).
            המספרים הם סיכומים בלבד · אין כאן מידע אישי על אף אחד.
        </div>

        <div id="content"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ── Simple in-code password (UI gate only; real protection is that the
        //    server function returns aggregates only — no personal data) ──
        const DASHBOARD_PASSWORD = 'hilell2026';

        const SUPABASE_URL = 'https://nulazmrhbsnclvuafztt.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im51bGF6bXJoYnNuY2x2dWFmenR0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAwMjI3NTMsImV4cCI6MjA5NTU5ODc1M30.ygc95aAKFnDDp9x16kMmvfYYpFLXQNRYwd_H2etMvO8';
        const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function checkPass(){
            const v = document.getElementById('gate-input').value;
            if (v === DASHBOARD_PASSWORD || sessionStorage.getItem('cc_dash_ok') === '1') {
                sessionStorage.setItem('cc_dash_ok','1');
                document.getElementById('gate').style.display='none';
                document.getElementById('app').style.display='block';
                loadStats();
            } else {
                document.getElementById('gate-err').style.display='block';
            }
        }
        // auto-unlock within the same session
        if (sessionStorage.getItem('cc_dash_ok') === '1') checkPass();

        const n = x => (x==null?0:x).toLocaleString('he-IL');

        async function loadStats(){
            const content = document.getElementById('content');
            content.innerHTML = '<div class="empty"><i class="fa-solid fa-spinner fa-spin"></i> טוען נתונים…</div>';
            const { data, error } = await sb.rpc('get_game_stats');
            if (error) {
                content.innerHTML = `<div class="empty">לא ניתן לטעון נתונים.<br><small style="color:var(--text-muted)">${error.message}</small><br><br>
                    ודא שהרצת את הקובץ <code>dashboard_stats_function.sql</code> ב-Supabase.</div>`;
                return;
            }
            render(data);
        }

        function kpi(num, lbl, exp, accent){
            return `<div class="card" style="--accent:${accent}"><div class="num">${num}</div><div class="lbl">${lbl}</div><div class="exp">${exp}</div></div>`;
        }

        function render(d){
            const t=d.totals, e=d.engagement, f=d.funnel, s=d.series||[];
            const totalPlayers = t.total_players||0;
            if (totalPlayers === 0){
                document.getElementById('content').innerHTML =
                    `<div class="empty">עדיין אין נתונים 🙂<br><small style="color:var(--text-muted)">ברגע שאנשים יתחילו לשחק, המספרים יופיעו כאן. ודא שהפעלת Anonymous Auth ב-Supabase.</small></div>`;
                return;
            }
            const pct = x => totalPlayers ? Math.round(100*x/totalPlayers) : 0;

            let html = '';

            // Visitors / players
            html += `<div class="section-t"><i class="fa-solid fa-users"></i> כמה אנשים</div>`;
            html += `<div class="grid g4">
                ${kpi(n(t.total_players),'סה״כ שחקנים','כל מי שנכנס למשחק אי פעם','var(--terminal)')}
                ${kpi(n(t.active_7d),'פעילים השבוע','שיחקו ב-7 הימים האחרונים','var(--blue)')}
                ${kpi(n(t.new_today),'חדשים היום','נכנסו לראשונה היום','var(--purple)')}
                ${kpi(n(t.new_7d),'חדשים השבוע','נכנסו לראשונה ב-7 ימים','var(--gold)')}
            </div>`;

            // Engagement
            html += `<div class="section-t"><i class="fa-solid fa-fire"></i> מעורבות והתקדמות</div>`;
            html += `<div class="grid g3">
                ${kpi(n(e.avg_xp),'ניקוד ממוצע','כמה XP בממוצע צובר שחקן','var(--terminal)')}
                ${kpi(n(e.avg_lessons),'שיעורים בממוצע','כמה שיעורים בממוצע משלימים','var(--blue)')}
                ${kpi((e.avg_accuracy||0)+'%','דיוק ממוצע','אחוז תשובות נכונות','var(--purple)')}
                ${kpi(n(e.avg_streak),'רצף ממוצע (ימים)','כמה ימים ברצף בממוצע','var(--gold)')}
                ${kpi(n(e.longest_streak),'הרצף הארוך ביותר','שיא ימים רצופים של שחקן','var(--warning)')}
                ${kpi(n(e.max_xp),'הניקוד הגבוה ביותר','השחקן עם הכי הרבה XP','var(--error)')}
            </div>`;

            // Funnel
            html += `<div class="section-t"><i class="fa-solid fa-filter"></i> משפך ההמרה · כמה זה מזמין ללמוד</div>`;
            const steps = [
                ['נכנסו למשחק', f.entered, 'var(--terminal)'],
                ['התחילו לתרגל', f.started, 'var(--blue)'],
                ['סיימו לפחות שיעור', f.finished_lesson, 'var(--purple)'],
                ['חזרו שוב', f.returned, 'var(--gold)']
            ];
            html += `<div class="funnel">`;
            steps.forEach(([lbl,val,c])=>{
                const w = Math.max(pct(val), val>0?6:0);
                html += `<div class="frow">
                    <div class="flbl">${lbl}</div>
                    <div class="fbar-wrap"><div class="fbar" style="width:${w}%;background:linear-gradient(90deg,${c},${c}cc)"><span>${n(val)}</span></div></div>
                    <div class="fpct">${pct(val)}%</div>
                </div>`;
            });
            html += `</div>`;

            // Time chart
            html += `<div class="section-t"><i class="fa-solid fa-chart-area"></i> לאורך זמן (30 ימים)</div>`;
            html += `<div class="chart-card">
                <div class="chart-legend">
                    <span><i class="dot" style="background:var(--purple)"></i> חדשים</span>
                    <span><i class="dot" style="background:var(--terminal)"></i> פעילים</span>
                </div>
                ${lineChart(s)}
            </div>`;

            document.getElementById('content').innerHTML = html;
        }

        // Dependency-free inline SVG line chart
        function lineChart(series){
            if (!series.length) return '<div class="empty">אין עדיין מספיק נתונים לגרף</div>';
            const W=920, H=240, pad={t:16,r:12,b:28,l:34};
            const iw=W-pad.l-pad.r, ih=H-pad.t-pad.b;
            const maxV = Math.max(1, ...series.map(p=>Math.max(p.new,p.active)));
            const x = i => pad.l + (series.length===1?iw/2:iw*i/(series.length-1));
            const y = v => pad.t + ih - (ih*v/maxV);
            const path = key => series.map((p,i)=>`${i?'L':'M'}${x(i).toFixed(1)},${y(p[key]).toFixed(1)}`).join(' ');
            const area = key => `${path(key)} L${x(series.length-1).toFixed(1)},${(pad.t+ih).toFixed(1)} L${x(0).toFixed(1)},${(pad.t+ih).toFixed(1)} Z`;
            // y gridlines
            let grid='';
            for(let g=0;g<=4;g++){const val=Math.round(maxV*g/4);const gy=y(val);
                grid+=`<line x1="${pad.l}" y1="${gy}" x2="${W-pad.r}" y2="${gy}" stroke="#1e2a3a" stroke-width="1"/>
                       <text x="${pad.l-6}" y="${gy+4}" fill="#6e7681" font-size="10" text-anchor="end">${val}</text>`;}
            // x labels (every ~6 days)
            let xlab='';
            series.forEach((p,i)=>{ if(i%6===0||i===series.length-1){const d=p.day.slice(5);
                xlab+=`<text x="${x(i)}" y="${H-8}" fill="#6e7681" font-size="10" text-anchor="middle">${d}</text>`;}});
            return `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" dir="ltr">
                ${grid}
                <path d="${area('active')}" fill="rgba(0,212,170,0.10)"/>
                <path d="${path('active')}" fill="none" stroke="#00d4aa" stroke-width="2.5" stroke-linejoin="round"/>
                <path d="${path('new')}" fill="none" stroke="#8b5cf6" stroke-width="2.5" stroke-linejoin="round" stroke-dasharray="0"/>
                ${xlab}
            </svg>`;
        }
    </script>
</body>
</html>
